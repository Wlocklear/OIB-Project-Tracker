<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Site Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'IBM Plex Mono', monospace; background: #0f1117; color: #e8e0d0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    header { background: #0f1117; border-bottom: 2px solid #f4a830; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; color: #f4a830; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .job-count { font-size: 11px; color: #888; letter-spacing: 1px; }
    .job-count span { color: #f4a830; font-weight: 600; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; display: inline-block; margin-right: 4px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .sync-label { font-size: 10px; color: #4caf50; letter-spacing: 1px; }
    .map-toggle { display: flex; align-items: center; gap: 8px; font-size: 10px; color: #888; letter-spacing: 1px; text-transform: uppercase; }
    .toggle-track { width: 40px; height: 20px; background: #2a2d38; border-radius: 10px; cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
    .toggle-track.on { background: #f4a830; }
    .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; background: #e8e0d0; border-radius: 50%; transition: left 0.2s; }
    .toggle-track.on .toggle-thumb { left: 23px; }
    .toggle-label { color: #888; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 285px; background: #13161e; border-right: 1px solid #2a2d38; overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; }
    .sidebar-header { padding: 14px 16px 10px; font-size: 10px; letter-spacing: 2px; color: #f4a830; text-transform: uppercase; border-bottom: 1px solid #2a2d38; }
    .job-list { padding: 8px 0; flex: 1; }
    #loadingMsg { padding: 20px 16px; font-size: 11px; color: #555; letter-spacing: 1px; }
    .job-item { padding: 12px 16px; border-left: 3px solid transparent; cursor: pointer; transition: all 0.2s; border-bottom: 1px solid #1e2130; }
    .job-item:hover, .job-item.active { background: #1a1e2a; border-left-color: #f4a830; }
    .job-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .job-number { font-size: 10px; color: #f4a830; letter-spacing: 1px; }
    .status-badge { font-size: 9px; letter-spacing: 0.5px; padding: 2px 6px; border-radius: 2px; font-weight: 600; text-transform: uppercase; }
    .status-active { background: #1a3a1a; color: #4caf50; }
    .status-completed { background: #1a2a3a; color: #4ab0f4; }
    .status-upcoming { background: #2a2a1a; color: #d4c860; }
    .job-name { font-size: 12px; font-weight: 600; color: #e8e0d0; line-height: 1.3; margin-bottom: 2px; }
    .job-address { font-size: 10px; color: #555; line-height: 1.4; margin-bottom: 6px; }
    .tag-row { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; flex-wrap: wrap; }
    .tag { font-size: 9px; padding: 2px 7px; border-radius: 2px; background: #1e2130; color: #a0a8c0; letter-spacing: 0.5px; text-transform: uppercase; }
    .tag.units { color: #7eb8a0; background: #142420; }
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 8px; margin-bottom: 8px; }
    .meta-label { font-size: 9px; color: #555; letter-spacing: 0.5px; text-transform: uppercase; }
    .meta-value { font-size: 10px; color: #aaa; }
    .meta-value.pm { color: #e8c87a; }
    .progress-row { display: flex; align-items: center; gap: 8px; }
    .progress-bar-bg { flex: 1; height: 4px; background: #2a2d38; border-radius: 2px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    .progress-label { font-size: 10px; color: #888; min-width: 30px; text-align: right; }
    .btn-row { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; gap: 4px; }
    .edit-btn, .del-btn { font-size: 9px; background: none; border: none; cursor: pointer; font-family: 'IBM Plex Mono', monospace; letter-spacing: 1px; text-transform: uppercase; padding: 0; }
    .edit-btn { color: #555; } .edit-btn:hover { color: #f4a830; }
    .del-btn { color: #555; } .del-btn:hover { color: #f87171; }
    .pin-btn { font-size: 9px; background: none; border: 1px solid #2a2d38; cursor: pointer; font-family: 'IBM Plex Mono', monospace; letter-spacing: 1px; text-transform: uppercase; padding: 2px 6px; color: #555; transition: all 0.15s; border-radius: 2px; }
    .pin-btn:hover { border-color: #f4a830; color: #f4a830; }
    .pin-btn.pinned { border-color: #f4a830; color: #f4a830; background: #2a1e00; }
    .add-btn { margin: 12px; padding: 10px; background: transparent; border: 1px dashed #f4a830; color: #f4a830; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
    .add-btn:hover { background: #f4a830; color: #0f1117; }
    .map-container { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }
    /* Info window styling */
    .gm-style .gm-style-iw-c { background: #13161e !important; border: 1px solid #f4a830 !important; border-radius: 2px !important; padding: 0 !important; }
    .gm-style .gm-style-iw-d { overflow: hidden !important; }
    .gm-style .gm-style-iw-t::after { background: #13161e !important; }
    .gm-style .gm-style-iw-tc::after { background: #13161e !important; }
    .iw-content { padding: 12px 14px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #e8e0d0; min-width: 180px; }
    .iw-name { font-size: 13px; font-weight: 600; color: #f4a830; margin-bottom: 4px; }
    .iw-addr { font-size: 10px; color: #666; margin-bottom: 6px; }
    .iw-row { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
    .iw-lbl { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
    .iw-val { font-size: 10px; color: #aaa; }
    .iw-val.pm { color: #e8c87a; }
    .iw-btns { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
    .iw-btn { display: block; text-align: center; padding: 6px 10px; font-size: 10px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.5px; text-decoration: none; border: 1px solid #2a2d38; color: #aaa; border-radius: 2px; transition: all 0.15s; }
    .iw-btn:hover { border-color: #f4a830; color: #f4a830; }
    .iw-btn-primary { background: #f4a830; color: #0f1117 !important; border-color: #f4a830; font-weight: 600; }
    .iw-btn-primary:hover { background: #e09520; }
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal { background: #13161e; border: 1px solid #f4a830; padding: 24px; width: 400px; max-height: 92vh; overflow-y: auto; font-family: 'IBM Plex Mono', monospace; }
    .modal h2 { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: #f4a830; margin-bottom: 16px; }
    .modal label { display: block; font-size: 10px; letter-spacing: 1px; color: #888; text-transform: uppercase; margin-bottom: 4px; margin-top: 12px; }
    .modal input, .modal select { width: 100%; background: #0f1117; border: 1px solid #2a2d38; color: #e8e0d0; font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 8px 10px; outline: none; }
    .modal input:focus, .modal select:focus { border-color: #f4a830; }
    .modal select option { background: #13161e; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .two-col > div label { margin-top: 0; }
    .range-row { display: flex; align-items: center; gap: 10px; }
    .range-row input[type=range] { flex: 1; accent-color: #f4a830; }
    .range-val { font-size: 12px; color: #f4a830; min-width: 36px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
    .btn-primary { flex: 1; padding: 10px; background: #f4a830; color: #0f1117; border: none; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; }
    .btn-cancel { flex: 1; padding: 10px; background: transparent; color: #888; border: 1px solid #2a2d38; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; }
    .btn-cancel:hover { color: #e8e0d0; border-color: #888; }
    .divider { border: none; border-top: 1px solid #2a2d38; margin: 14px 0 2px; }
  </style>
</head>
<body>
<header>
  <div class="logo">⚒ Job Site Tracker</div>
  <div class="header-right">
    <div><span class="sync-dot"></span><span class="sync-label">LIVE</span></div>
    <div class="map-toggle">
      <div class="toggle-track" id="toggleTrack" onclick="toggleMapMode()">
        <div class="toggle-thumb"></div>
      </div>
      <span class="toggle-label" id="toggleLabel">Show Selected Only</span>
    </div>
    <div class="job-count"><span id="count">0</span> Sites</div>
  </div>
</header>
<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">Job Sites</div>
    <div class="job-list" id="jobList">
      <div id="loadingMsg">⟳ Connecting to database...</div>
    </div>
    <button class="add-btn" onclick="openModal()">+ Add Job Site</button>
  </div>
  <div class="map-container">
    <div id="map"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">Add Job Site</h2>
    <label>Job Name</label>
    <input type="text" id="inputName" placeholder="e.g. Sunset Ridge Phase 1" />
    <label>Address</label>
    <input type="text" id="inputAddress" placeholder="e.g. 123 Main St, Surf City, NC" />
    <label>Project Manager</label>
    <input type="text" id="inputPM" placeholder="e.g. John Smith" />
    <hr class="divider">
    <div class="two-col">
      <div>
        <label>Project Type</label>
        <select id="inputType">
          <option value="">— Select —</option>
          <option>Single Family</option>
          <option>Multi-Family</option>
          <option>Townhomes</option>
          <option>Condos</option>
          <option>Apartments</option>
          <option>Commercial</option>
          <option>Mixed Use</option>
          <option>Renovation</option>
          <option>Other</option>
        </select>
      </div>
      <div>
        <label>Unit Count</label>
        <input type="number" id="inputUnits" placeholder="e.g. 24" min="0" />
      </div>
    </div>
    <hr class="divider">
    <div class="two-col">
      <div>
        <label>Start Date</label>
        <input type="date" id="inputStart" />
      </div>
      <div>
        <label>Est. Completion</label>
        <input type="date" id="inputEnd" />
      </div>
    </div>
    <hr class="divider">
    <label>Status</label>
    <select id="inputStatus">
      <option value="active">Active</option>
      <option value="upcoming">Upcoming</option>
      <option value="completed">Completed</option>
    </select>
    <label>Percent Complete</label>
    <div class="range-row">
      <input type="range" id="inputPercent" min="0" max="100" value="0" oninput="document.getElementById('rangeVal').textContent=this.value+'%'">
      <span class="range-val" id="rangeVal">0%</span>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="modalSaveBtn" onclick="saveJob()">Add Site</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAZKPLWcNpVuVWhpAnkU5A0_ZxRJQBtXpE",
    authDomain: "oib-projects.firebaseapp.com",
    databaseURL: "https://oib-projects-default-rtdb.firebaseio.com",
    projectId: "oib-projects",
    storageBucket: "oib-projects.firebasestorage.app",
    messagingSenderId: "504283453184",
    appId: "1:504283453184:web:97b40026523231569105e5"
  };

  const fbApp = initializeApp(firebaseConfig);
  const db = getDatabase(fbApp);
  const jobsRef = ref(db, 'jobs');

  const STATUS_LABELS = { active: 'Active', completed: 'Completed', upcoming: 'Upcoming' };
  const STATUS_COLORS = { active: '#f4a830', completed: '#4ab0f4', upcoming: '#d4c860' };

  let jobs = [];
  let activeJob = null, editingId = null;
  let showSelectedOnly = false;
  let pinnedIds = new Set();
  let gmap = null;
  let gmMarkers = {};
  let infoWindow = null;
  let mapInitialized = false;

  // ── Google Maps init (called by API callback) ───────────────────────────────
  window.initMap = function() {
    gmap = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 34.438, lng: -77.552 },
      zoom: 13,
      mapTypeId: 'roadmap',
      styles: [
        { featureType: 'all', elementType: 'geometry', stylers: [{ color: '#1a1e2a' }] },
        { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#0d1520' }] },
        { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#2a2d3a' }] },
        { featureType: 'road', elementType: 'geometry.stroke', stylers: [{ color: '#1a1d2a' }] },
        { featureType: 'poi', elementType: 'geometry', stylers: [{ color: '#1e2230' }] },
        { featureType: 'transit', elementType: 'geometry', stylers: [{ color: '#1e2230' }] },
        { featureType: 'all', elementType: 'labels.text.stroke', stylers: [{ color: '#0f1117' }] },
        { featureType: 'all', elementType: 'labels.text.fill', stylers: [{ color: '#6b7280' }] },
        { featureType: 'road.arterial', elementType: 'labels.text.fill', stylers: [{ color: '#888' }] },
        { featureType: 'administrative', elementType: 'geometry', stylers: [{ color: '#2a2d38' }] },
        { featureType: 'landscape.natural', elementType: 'geometry', stylers: [{ color: '#1a2a1a' }] },
        { featureType: 'poi', elementType: 'all', stylers: [{ visibility: 'off' }] },
        { featureType: 'transit', elementType: 'all', stylers: [{ visibility: 'off' }] }
      ],
      disableDefaultUI: false,
      zoomControl: true,
      mapTypeControl: true,
      streetViewControl: false,
      fullscreenControl: true
    });
    infoWindow = new google.maps.InfoWindow();
    mapInitialized = true;
    if (jobs.length > 0) { rebuildMarkers(); fitMap(); }
  };

  // ── Firebase ────────────────────────────────────────────────────────────────
  onValue(jobsRef, (snapshot) => {
    const data = snapshot.val();
    jobs = data ? Object.entries(data).map(([fbKey, val]) => ({ ...val, fbKey })) : [];
    renderJobs();
    if (mapInitialized) { rebuildMarkers(); fitMap(); }
    document.getElementById('loadingMsg').style.display = 'none';
  });

  async function saveToFirebase(jobData) {
    if (jobData.fbKey) {
      const { fbKey, ...data } = jobData;
      await update(ref(db, `jobs/${fbKey}`), data);
    } else {
      await push(jobsRef, jobData);
    }
  }

  async function deleteFromFirebase(fbKey) {
    await remove(ref(db, `jobs/${fbKey}`));
  }

  // Seed if empty
  onValue(jobsRef, (snapshot) => {
    if (!snapshot.val()) {
      push(jobsRef, { name: "Turtle Cay Villas", address: "211 N Shore Drive, Surf City, NC 28445", lat: 34.4275464, lng: -77.5422753, status: 'active', percent: 0, pm: '', start: '', end: '', type: '', units: '' });
      push(jobsRef, { name: "Topsail Landing Apts Phase II", address: "400 Gateway Condo Drive, Surf City, NC", lat: 34.4483438, lng: -77.5615301, status: 'active', percent: 0, pm: '', start: '', end: '', type: '', units: '' });
    }
  }, { onlyOnce: true });

  // ── Map helpers ─────────────────────────────────────────────────────────────
  function makeMarkerIcon(job, isSelected) {
    const color = isSelected ? '#ffffff' : STATUS_COLORS[job.status] || '#f4a830';
    const stroke = isSelected ? '#f4a830' : '#0f1117';
    const num = jobs.indexOf(job) + 1;
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="44" viewBox="0 0 36 44">
      <path d="M18 0 C8.06 0 0 8.06 0 18 C0 31.5 18 44 18 44 C18 44 36 31.5 36 18 C36 8.06 27.94 0 18 0Z" fill="${color}" stroke="${stroke}" stroke-width="2"/>
      <text x="18" y="23" text-anchor="middle" font-size="13" font-weight="bold" font-family="monospace" fill="#0f1117">${num}</text>
    </svg>`;
    return {
      url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
      scaledSize: new google.maps.Size(36, 44),
      anchor: new google.maps.Point(18, 44)
    };
  }

  function makeInfoContent(job) {
    const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(job.address)}`;
    const streetViewUrl = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${job.lat},${job.lng}`;
    const satelliteUrl = `https://www.google.com/maps/search/?api=1&query=${job.lat},${job.lng}&basemap=satellite`;
    return `<div class="iw-content">
      <div class="iw-name">${job.name}</div>
      <div class="iw-addr">${job.address}</div>
      <div class="iw-row">
        <div><div class="iw-lbl">Status</div><div class="iw-val">${STATUS_LABELS[job.status]}</div></div>
        <div><div class="iw-lbl">Complete</div><div class="iw-val">${job.percent || 0}%</div></div>
      </div>
      ${job.pm ? `<div class="iw-row" style="margin-top:4px"><div><div class="iw-lbl">PM</div><div class="iw-val pm">${job.pm}</div></div>${job.type ? `<div><div class="iw-lbl">Type</div><div class="iw-val">${job.type}</div></div>` : ''}</div>` : ''}
      <div class="iw-btns">
        <a href="${mapsUrl}" target="_blank" class="iw-btn iw-btn-primary">🧭 Get Directions</a>
        <a href="${streetViewUrl}" target="_blank" class="iw-btn">📷 Street View</a>
        <a href="${satelliteUrl}" target="_blank" class="iw-btn">🛰 Satellite</a>
      </div>
    </div>`;
  }

  function rebuildMarkers() {
    Object.values(gmMarkers).forEach(m => m.setMap(null));
    gmMarkers = {};
    const visible = showSelectedOnly ? jobs.filter(j => pinnedIds.has(j.fbKey)) : jobs;
    visible.forEach(job => {
      const isSelected = activeJob === job.fbKey;
      const marker = new google.maps.Marker({
        position: { lat: job.lat, lng: job.lng },
        map: gmap,
        icon: makeMarkerIcon(job, isSelected),
        title: job.name,
        animation: isSelected ? google.maps.Animation.DROP : null
      });
      marker.addListener('click', () => {
        activeJob = job.fbKey;
        infoWindow.setContent(makeInfoContent(job));
        infoWindow.open(gmap, marker);
        renderJobs();
        rebuildMarkers();
      });
      if (isSelected) {
        infoWindow.setContent(makeInfoContent(job));
        infoWindow.open(gmap, marker);
      }
      gmMarkers[job.fbKey] = marker;
    });
  }

  function fitMap() {
    if (!gmap) return;
    const visible = showSelectedOnly ? jobs.filter(j => pinnedIds.has(j.fbKey)) : jobs;
    if (visible.length === 0) return;
    if (visible.length === 1) { gmap.setCenter({ lat: visible[0].lat, lng: visible[0].lng }); gmap.setZoom(15); return; }
    const bounds = new google.maps.LatLngBounds();
    visible.forEach(j => bounds.extend({ lat: j.lat, lng: j.lng }));
    gmap.fitBounds(bounds, 80);
  }

  function focusJob(job) {
    activeJob = job.fbKey;
    if (gmap) { gmap.panTo({ lat: job.lat, lng: job.lng }); gmap.setZoom(16); }
    renderJobs(); rebuildMarkers();
  }

  // ── Toggle ──────────────────────────────────────────────────────────────────
  window.toggleMapMode = function() {
    showSelectedOnly = !showSelectedOnly;
    document.getElementById('toggleTrack').classList.toggle('on', showSelectedOnly);
    document.getElementById('toggleLabel').textContent = showSelectedOnly ? 'Selected Only' : 'Show Selected Only';
    if (!showSelectedOnly) activeJob = null;
    renderJobs(); rebuildMarkers(); fitMap();
  };

  window.togglePin = function(fbKey, e) {
    e.stopPropagation();
    if (pinnedIds.has(fbKey)) pinnedIds.delete(fbKey); else pinnedIds.add(fbKey);
    renderJobs();
    if (showSelectedOnly) { rebuildMarkers(); fitMap(); }
  };

  // ── Render sidebar ──────────────────────────────────────────────────────────
  function getProgressColor(pct) { return pct < 30 ? '#f87171' : pct < 70 ? '#f4a830' : '#4caf50'; }
  function fmtDate(d) { if (!d) return '—'; const [y,m,day] = d.split('-'); return `${m}/${day}/${y}`; }

  function renderJobs() {
    const list = document.getElementById('jobList');
    list.innerHTML = '';
    jobs.forEach((job, i) => {
      const isPinned = pinnedIds.has(job.fbKey);
      const isActive = activeJob === job.fbKey;
      const pct = job.percent || 0;
      const div = document.createElement('div');
      div.className = 'job-item' + (isActive ? ' active' : '');
      div.innerHTML = `
        <div class="job-top">
          <div class="job-number">SITE #${String(i+1).padStart(2,'0')}</div>
          <span class="status-badge status-${job.status}">${STATUS_LABELS[job.status]}</span>
        </div>
        <div class="job-name">${job.name}</div>
        <div class="job-address">${job.address}</div>
        <div class="tag-row">
          ${job.type ? `<span class="tag">${job.type}</span>` : ''}
          ${job.units ? `<span class="tag units">${job.units} units</span>` : ''}
        </div>
        <div class="meta-grid">
          <div class="meta-item"><div class="meta-label">PM</div><div class="meta-value pm">${job.pm || '—'}</div></div>
          <div class="meta-item"><div class="meta-label">Complete</div><div class="meta-value">${pct}%</div></div>
          <div class="meta-item"><div class="meta-label">Start</div><div class="meta-value">${fmtDate(job.start)}</div></div>
          <div class="meta-item"><div class="meta-label">Est. End</div><div class="meta-value">${fmtDate(job.end)}</div></div>
        </div>
        <div class="progress-row">
          <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;background:${getProgressColor(pct)}"></div></div>
          <div class="progress-label">${pct}%</div>
        </div>
        <div class="btn-row">
          <button class="edit-btn" onclick="openEdit('${job.fbKey}',event)">✎ edit</button>
          <button class="del-btn" onclick="confirmDelete('${job.fbKey}',event)">✕ delete</button>
          <button class="pin-btn ${isPinned ? 'pinned' : ''}" onclick="togglePin('${job.fbKey}',event)">${isPinned ? '★ pinned' : '☆ pin'}</button>
        </div>
      `;
      div.onclick = (e) => {
        if (['edit-btn','del-btn','pin-btn'].some(c => e.target.classList.contains(c))) return;
        focusJob(job);
      };
      list.appendChild(div);
    });
    document.getElementById('count').textContent = jobs.length;
  }

  // ── Delete ──────────────────────────────────────────────────────────────────
  window.confirmDelete = function(fbKey, e) {
    e.stopPropagation();
    if (confirm('Delete this job site?')) {
      deleteFromFirebase(fbKey);
      if (activeJob === fbKey) activeJob = null;
      pinnedIds.delete(fbKey);
    }
  };

  // ── Modal ───────────────────────────────────────────────────────────────────
  window.openModal = function() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'Add Job Site';
    document.getElementById('modalSaveBtn').textContent = 'Add Site';
    ['inputName','inputAddress','inputPM','inputUnits','inputStart','inputEnd'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('inputType').value = '';
    document.getElementById('inputStatus').value = 'active';
    document.getElementById('inputPercent').value = 0;
    document.getElementById('rangeVal').textContent = '0%';
    document.getElementById('modalBg').classList.add('open');
    document.getElementById('inputName').focus();
  };

  window.openEdit = function(fbKey, e) {
    e.stopPropagation();
    const job = jobs.find(j => j.fbKey === fbKey); if (!job) return;
    editingId = fbKey;
    document.getElementById('modalTitle').textContent = 'Edit Job Site';
    document.getElementById('modalSaveBtn').textContent = 'Save Changes';
    document.getElementById('inputName').value = job.name;
    document.getElementById('inputAddress').value = job.address;
    document.getElementById('inputPM').value = job.pm || '';
    document.getElementById('inputType').value = job.type || '';
    document.getElementById('inputUnits').value = job.units || '';
    document.getElementById('inputStart').value = job.start || '';
    document.getElementById('inputEnd').value = job.end || '';
    document.getElementById('inputStatus').value = job.status;
    document.getElementById('inputPercent').value = job.percent || 0;
    document.getElementById('rangeVal').textContent = (job.percent || 0) + '%';
    document.getElementById('modalBg').classList.add('open');
  };

  window.closeModal = function() { document.getElementById('modalBg').classList.remove('open'); editingId = null; };

  window.saveJob = async function() {
    const name = document.getElementById('inputName').value.trim();
    const address = document.getElementById('inputAddress').value.trim();
    if (!name || !address) return;
    const pm = document.getElementById('inputPM').value.trim();
    const type = document.getElementById('inputType').value;
    const units = document.getElementById('inputUnits').value.trim();
    const start = document.getElementById('inputStart').value;
    const end = document.getElementById('inputEnd').value;
    const status = document.getElementById('inputStatus').value;
    const percent = parseInt(document.getElementById('inputPercent').value) || 0;

    document.getElementById('modalSaveBtn').textContent = 'Saving...';

    if (editingId !== null) {
      const job = jobs.find(j => j.fbKey === editingId);
      if (job) await saveToFirebase({ ...job, name, address, pm, type, units, start, end, status, percent });
      closeModal(); return;
    }

    let lat = 34.44, lng = -77.56;
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`);
      const data = await res.json();
      if (data.length > 0) { lat = parseFloat(data[0].lat); lng = parseFloat(data[0].lon); }
    } catch {}

    await saveToFirebase({ name, address, lat, lng, pm, type, units, start, end, status, percent });
    closeModal();
  };

</script>

<!-- Google Maps API -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCRRmEds9bwhZIv572gQvlIQLKqn8gigUM&callback=initMap" async defer></script>
